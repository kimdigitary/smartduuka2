server {
    listen 80;
    server_name your-vps-ip-or-custom-domain.com;

    location / {
        proxy_pass https://exotic.qualitywifi.xyz;

        # Essential headers for the destination to accept the request
        proxy_set_header Host exotic.qualitywifi.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix for potential redirects
        proxy_redirect https://exotic.qualitywifi.xyz/ /;

        # Optional: Increase timeouts if the ISP connection is slow
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }
}